version: "3.8"

services:
  frontend:
    build: ./VulLink-Visualizer
    container_name: vullink-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./VulLink-API
    container_name: vullink-backend
    ports:
      - "8000:8000"
    env_file:
      - ./VulLink-API/.env
    restart: unless-stopped